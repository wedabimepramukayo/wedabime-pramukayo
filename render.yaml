# Render Blueprint — Wedabime Pramukayo CMS
# Deploys as a Node.js Web Service (NOT Cloudflare Workers)
# This ensures NextAuth, bcrypt, and Prisma work correctly on standard Node.js runtime
#
# IMPORTANT: In Render Dashboard, set:
#   - Build Command:  bun install && bun run build
#   - Start Command:  bun run start
#   - Do NOT use "npx wrangler deploy" — this app is NOT a Cloudflare Workers app

services:
  - type: web
    name: wedabime-pramukayo
    runtime: node
    plan: free
    region: singapore
    buildCommand: bun install && prisma db push --accept-data-loss && bun run build
    startCommand: bun run start
    envVars:
      - key: DATABASE_URL
        sync: false
        # Set this to your Neon PostgreSQL connection string
        # Example: postgresql://neondb_owner:pass@ep-xxx-region.aws.neon.tech/neondb?sslmode=require
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        # Will be auto-set from the service URL after first deploy
        # Update manually after deploy: https://your-app.onrender.com
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_FOLDER
        value: wedabime-pramukayo
      - key: NODE_ENV
        value: production
